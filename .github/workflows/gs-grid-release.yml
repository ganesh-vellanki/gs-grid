name: gs-grid-release

on:
  workflow_dispatch:

jobs:
  publish:
    name: Validate, Build, and Publish
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: yarn

      - name: Validate release branch
        shell: bash
        run: |
          branch_name="${GITHUB_REF_NAME}"

          if [[ ! "$branch_name" =~ ^release/(v)?[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "This workflow only publishes from branches named release/x.y.z or release/vx.y.z"
            echo "Current branch: $branch_name"
            exit 1
          fi

      - name: Enforce version parity before build
        shell: bash
        run: |
          branch_name="${GITHUB_REF_NAME}"
          branch_version="${branch_name#release/}"
          branch_version="${branch_version#v}"
          package_version="$(node -p "require('./package.json').version")"

          echo "Release branch version: $branch_version"
          echo "package.json version: $package_version"

          if [[ "$branch_version" != "$package_version" ]]; then
            echo "Build and publish are blocked because package.json version and release branch version must be identical."
            echo "Expected package.json version to match release branch version before continuing."
            exit 1
          fi

      - name: Install dependencies
        run: yarn install --frozen-lockfile

      - name: Build publishable package
        run: yarn build:package

      - name: Verify npm package contents
        run: npm pack --dry-run

      - name: Publish package to npmjs
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
