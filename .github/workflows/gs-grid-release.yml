name: gs-grid-release

on: [workflow_dispatch]

jobs:
  test:
    runs-on: ${{ matrix.os }}

    strategy:
      matrix:
        deno: ["v1.x"]
        os: [ubuntu-latest]

    steps:
      - name: Setup repo
        uses: actions/checkout@v4

      - name: Setup Deno
        uses: denoland/setup-deno@v1
        with:
          deno-version: ${{ matrix.deno }}

      - name: Install & Build
        run: |
          yarn clean
          yarn install
          yarn build

      - name: Generate docs
        run: yarn docs

      - name: Copy App
        run: yarn copy:app

      - name: NPM Publish
        # JS-DevTools/npm-publish v1 is still fine to use; keep token config as-is
        uses: JS-DevTools/npm-publish@v1
        with:
          token: ${{ secrets.NPM_TOKEN }}
